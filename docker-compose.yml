version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: void-postgres
    restart: always
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_password123
      POSTGRES_DB: strapi
    ports:
      - "5432:5432"
    volumes:
      - void-pg-data:/var/lib/postgresql/data

volumes:
  void-pg-data:
